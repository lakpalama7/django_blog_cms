{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="{% static 'css/output.css' %}">
</head>

<body>
    <!-- navbar section start -->

    {% include '../components/_navbar.html'%}
    <!-- navbar section end -->

    <!-- blog section start -->

    <div class="max-w-screen-xl mx-auto p-5 sm:p-8 md:p-12 relative">
        <div class="bg-cover h-64 text-center overflow-hidden"
            style="height: 450px; background-image: url({{blog.image.url}})">
        </div>
        <div class="max-w-2xl mx-auto">
            <div
                class="mt-3 bg-white rounded-b lg:rounded-b-none lg:rounded-r flex flex-col justify-between leading-normal">

                <div class="">


                    <a href="#"
                        class="text-xs text-indigo-600 uppercase font-medium hover:text-gray-900 transition duration-500 ease-in-out">
                        {{blog.subtitle}}
                    </a>
                    <h1 href="#" class="text-gray-900 font-bold text-3xl mb-2">{{blog.title}}</h1>
                    <p class="text-gray-700 text-xs mt-2">Written By:
                        <a href="#"
                            class="text-indigo-600 font-medium hover:text-gray-900 transition duration-500 ease-in-out">
                            Ahmad Sultani
                        </a>
                    </p>

                    <p class="text-base leading-8 my-5">
                        {{blog.description}}
                    </p>



                </div>

            </div>
            <form action="{% url 'delete_blog' blog.id %}">
                <button class="bg-red-500 p-2 text-white font-bold rounded-2xl cursor-pointer hover:bg-red-300">
                    Delete blog
                </button>
            </form>
        </div>


    </div>
    <!-- form section end -->

</body>

</html>
